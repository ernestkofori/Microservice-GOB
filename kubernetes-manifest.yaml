apiVersion: apps/v1
kind: Deployment
metadata:
  name: emailservice-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emailservice
  template:
    metadata:
      labels:
        app: emailservice
    spec:
      containers:
      - name: emailservice-container
        image: us-central1-docker.pkg.dev/google-samples/microservices-demo/emailservice:v0.10.5
        ports:
        - containerPort: 8080      # The port your app code listens on
        env:
        - name: PORT
          value: "8080"            # Set the PORT environment variable to match the containerPort
        livenessProbe:             # Checking the health of the container to ensure it is running properly
          grpc:
            port: 8080
          periodSeconds: 5
          initialDelaySeconds: 10
        readinessProbe:            # Checking the health of the container to ensure it is ready to serve traffic 
          grpc:
            port: 8080
          periodSeconds: 5
          initialDelaySeconds: 10
        resources:                 # Set resource requests and limits to ensure the container has enough resources to run properly
          requests:
            cpu: "100m"             # Request 100 millicores of CPU
            memory: "128Mi"         # Request 128 MiB of memory
          limits:
            cpu: "200m"             # Limit to 200 millicores of CPU
            memory: "256Mi"         # Limit to 256 MiB of memory



---

apiVersion: v1
kind: Service
metadata:
  name: emailservice              # This must match your minikube service command
spec:
  type: ClusterIP                 # ClusterIP does not expose the port outside the cluster.
  selector:
    app: emailservice                 # <-- This tells the Service which Pods to route to
  ports:
  - port: 8081                   # The port exposed outside the cluster
    targetPort: 8080             # The port inside your container to forward to

