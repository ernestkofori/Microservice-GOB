apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis-container
        image: redis:6.0-alpine
        ports:
        - containerPort: 6379      # The port Redis listens on
        volumeMounts:
        - mountPath: /data          # Mount the volume at /data inside the container
          name: redis-data          # Name of the volume to mount
        env:
        - name: ALLOW_EMPTY_PASSWORD
          value: "yes"             # Allow Redis to start without a password for simplicity in this demo
        livenessProbe:             # Checking the health of the container to ensure it is running properly
          tcpSocket:
            port: 6379
          periodSeconds: 5
          initialDelaySeconds: 10
        readinessProbe:            # Checking the health of the container to ensure it is ready to serve traffic 
          tcpSocket:
            port: 6379
          periodSeconds: 5
          initialDelaySeconds: 10
        resources:                 # Set resource requests and limits to ensure the container has enough resources to run properly
          requests:
            cpu: "70m"             # Request 70 millicores of CPU
            memory: "200Mi"         # Request 200 MiB of memory
          limits:
            cpu: "100m"             # Limit to 100 millicores of CPU  
            memory: "400Mi"         # Limit to 400 MiB of memory
      volumes:
      - name: redis-data
        emptyDir: {}               # Use an emptyDir volume for Redis data (not persistent, suitable for demo purposes only)

---

apiVersion: v1
kind: Service
metadata:
  name: redis            # This must match your minikube service command
spec:
  type: ClusterIP                 # ClusterIP does not expose the port outside the cluster.
  selector:
    app: redis                 # <-- This tells the Service which Pods to route to
  ports:
  - port: 6379                   # The port exposed outside the cluster
    targetPort: 6379             # The port inside your container to forward to

